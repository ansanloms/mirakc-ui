name: mirakc-ui

services:
  workspace:
    image: mcr.microsoft.com/devcontainers/base:bookworm
    entrypoint: []
    command: ["sleep", "infinity"]
    environment:
      MIRAKC_URL: ${MIRAKC_URL}
      # 日時整形のタイムゾーン。未設定なら UTC (空文字は Etc/Unknown になるため
      # 明示デフォルトを置く)。.devcontainer/.env で TZ=Asia/Tokyo 等を指定する。
      TZ: ${TZ:-UTC}

  app:
    build:
      context: ${WORK_DIR:-.}/..
      dockerfile: Dockerfile
    entrypoint: []
    command: ["deno", "task", "dev"]
    volumes:
      - ${WORK_DIR:-.}/..:/app
      - node_modules:/app/node_modules
      # 設定系データ (Deno KV の SQLite)。ホスト側のリポジトリを汚さず、
      # コンテナ再作成をまたいで永続化するため named volume にする。
      - data:/app/data
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      MIRAKC_URL: ${MIRAKC_URL}
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-}
      # 録画通知・録画ファイル名の日時整形に使う。未設定なら UTC (空文字は
      # Etc/Unknown になるため明示デフォルトを置く)。.devcontainer/.env で指定する。
      TZ: ${TZ:-UTC}

volumes:
  node_modules:
  data:
