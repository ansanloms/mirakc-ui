name: mirakc-ui

services:
  workspace:
    image: mcr.microsoft.com/devcontainers/base:bookworm
    entrypoint: []
    command: ["sleep", "infinity"]
    environment:
      MIRAKC_URL: ${MIRAKC_URL}

  app:
    build:
      context: ${WORK_DIR:-.}/..
      dockerfile: Dockerfile
    entrypoint: []
    command: ["deno", "task", "dev"]
    volumes:
      - ${WORK_DIR:-.}/..:/app
      - node_modules:/app/node_modules
      # 設定系データ (Deno KV の SQLite)。ホスト側のリポジトリを汚さず、
      # コンテナ再作成をまたいで永続化するため named volume にする。
      - data:/app/data
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      MIRAKC_URL: ${MIRAKC_URL}
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-}

volumes:
  node_modules:
  data:
