type: object
additionalProperties: false
description:
  $ref: "./descriptions/LiveCommentSettingsView.md"
required:
  - saved
  - channels
  - suggestions
properties:
  saved:
    type: boolean
    description: 保存済みか。false の場合は channels が組み込み対照表からの既定値であることを表す。
  channels:
    $ref: ./LiveCommentSettings.yaml
  suggestions:
    type: object
    additionalProperties: false
    description: 取得元ごとの自動補完候補。複合サービス ID (文字列) からチャンネル ID への対応。
    required:
      - nicolive
      - nx-jikkyo
    properties:
      nicolive:
        type: object
        description: ニコニコ実況の候補。複合サービス ID (文字列) から `ch` 始まりの ID への対応。
        additionalProperties:
          type: string
      nx-jikkyo:
        type: object
        description: NX-Jikkyo の候補。複合サービス ID (文字列) から `jk` 始まりの ID への対応。
        additionalProperties:
          type: string
