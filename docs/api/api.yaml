openapi: 3.1.0
info:
  version: 0.0.1
  title: mirakc-ui internal API
  description:
    $ref: ./README.md
servers:
  - url: /api
    description: mirakc-ui のアプリサーバ (Hono) が提供する内部 API。
tags:
  - name: keyword-rules
    description: キーワード自動録画ルールの管理。
  - name: notification-settings
    description: ntfy への録画イベント通知の設定。
  - name: live-comment-settings
    description: 実況コメントの取得元ごとのチャンネル割り当ての設定。
  - name: transcode
    description: ライブ視聴のトランスコードストリーム配信。
paths:
  /keyword-rules:
    $ref: ./paths/keyword-rules.yaml
  /keyword-rules/{id}:
    $ref: ./paths/keyword-rules.{id}.yaml
  /notification-settings:
    $ref: ./paths/notification-settings.yaml
  /notification-settings/test:
    $ref: ./paths/notification-settings.test.yaml
  /live-comment-settings:
    $ref: ./paths/live-comment-settings.yaml
  /live-comment-settings/{id}:
    $ref: ./paths/live-comment-settings.{id}.yaml
  /transcode/services/{id}:
    $ref: ./paths/transcode.services.{id}.yaml
components:
  schemas:
    KeywordRule:
      $ref: ./components/schemas/KeywordRule.yaml
    KeywordRuleInput:
      $ref: ./components/schemas/KeywordRuleInput.yaml
    NotificationSettings:
      $ref: ./components/schemas/NotificationSettings.yaml
    NotificationTestRequest:
      $ref: ./components/schemas/NotificationTestRequest.yaml
    NotificationTestResponse:
      $ref: ./components/schemas/NotificationTestResponse.yaml
    LiveCommentAssignment:
      $ref: ./components/schemas/LiveCommentAssignment.yaml
    LiveCommentMapping:
      $ref: ./components/schemas/LiveCommentMapping.yaml
    LiveCommentMappingInput:
      $ref: ./components/schemas/LiveCommentMappingInput.yaml
    ResponseError:
      $ref: ./components/schemas/ResponseError.yaml
